name: 部署到阿里云 OSS

on:
  push:
    branches:
      - main # 或者是你的主分支名称

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 安装依赖并构建
        run: |
          npm install
          npm run build

      - name: 上传到阿里云 OSS
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: oss-cn-beijing.aliyuncs.com # 你的 OSS 地域节点
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      
      - name: 同步文件
        run: ossutil cp -rf dist/ oss://zhiwuzhi/ # 替换 zhiwuzhi 为你的 Bucket 名称
